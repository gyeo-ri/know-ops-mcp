[project]
name = "cursor-memo"
version = "0.1.0"
description = "Shared knowledge MCP server for Cursor and LLM chatbots"
requires-python = ">=3.11"
dependencies = [
    "fastmcp>=3.2.0",
    "python-frontmatter>=1.0",
]

[project.scripts]
cursor-memo = "cursor_memo.server:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["cursor_memo"]
